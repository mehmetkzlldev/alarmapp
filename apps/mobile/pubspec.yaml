name: alarmy
description: WakeUp AI — AI-powered alarm clock with object-detection and math missions.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (Riverpod + codegen)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1

  # Dependency injection
  get_it: ^7.7.0
  injectable: ^2.4.1

  # Immutable models & JSON
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Functional error handling (Either<Failure, T>) — used by core/usecase
  dartz: ^0.10.1

  # Value equality for entities & failures
  equatable: ^2.0.5

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Offline alarm cache (simple JSON key-value; works on all platforms incl. web)
  shared_preferences: ^2.3.2

  # Sensors (shake mission)
  sensors_plus: ^5.0.1

  # Camera / image (object-detection mission)
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  firebase_messaging: ^15.0.4
  firebase_crashlytics: ^4.0.4

  # Local notifications
  flutter_local_notifications: ^17.2.1+2

  # Audio playback (alarm sound)
  audioplayers: ^6.0.0

  # Keep the screen awake on the full-screen ring route until missions pass.
  wakelock_plus: ^1.2.5

  # In-app purchases (premium). The platform-specific packages expose the
  # verification payloads our backend needs: GooglePlayPurchaseDetails
  # (purchaseToken) and AppStorePurchaseDetails (receipt / StoreKit JWS).
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.3.6
  in_app_purchase_storekit: ^0.3.16

  # Opening external legal links (Terms / Privacy) from the paywall.
  url_launcher: ^6.3.0

  # i18n / formatting (version pinned by flutter_localizations)
  intl: any

  # Charts (statistics)
  fl_chart: ^0.68.0

  # Misc
  collection: ^1.18.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  injectable_generator: ^2.6.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/
    - assets/images/

# App launcher icon ("WakeUp AI" sunrise). Regenerate with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_master.png"
  adaptive_icon_background: "#FF5A3C"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true
